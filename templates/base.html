<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}PeakML{% endblock %} — PeakML</title>
  <meta name="description" content="{% block meta_desc %}Полный инструментарий для игроков в Mobile Legends: Bang Bang{% endblock %}" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Russo+One&display=swap" rel="stylesheet" />

  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}" />

  {% block extra_css %}{% endblock %}
</head>
<body>

  {% include "partials/navbar.html" %}

  {% include "partials/messages.html" %}

  <main id="main-content">
    {% block content %}{% endblock %}
  </main>

  {% include "partials/footer.html" %}

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <script>
    /* CSRF для HTMX */
    document.addEventListener('htmx:configRequest', function(e) {
      e.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
    });

    /* Navbar scroll */
    const navbar = document.getElementById('navbar');
    if (navbar) {
      window.addEventListener('scroll', () => {
        navbar.classList.toggle('navbar--scrolled', window.scrollY > 20);
      }, { passive: true });
    }
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
