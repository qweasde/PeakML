{% load static %}
<header>
<nav id="navbar" style="
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:rgba(6,6,15,0.82);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  transition:background 200ms;
" aria-label="Основная навигация" x-data="{ open: false }">

  <div style="display:flex;align-items:center;justify-content:space-between;height:64px;max-width:1160px;margin:0 auto;padding:0 24px;">

    <a href="{% url 'core:home' %}" style="font-family:'Russo One',sans-serif;font-size:22px;color:var(--accent);text-decoration:none;letter-spacing:.04em;text-shadow:0 0 24px var(--accent-glow);flex-shrink:0;" aria-label="PeakML — главная">
      Peak<span style="color:var(--text-1)">ML</span>
    </a>

    <ul style="display:flex;align-items:center;gap:28px;list-style:none;" class="hidden md:flex">
      <li><a href="{% url 'meta:index' %}" class="nav-link {% if request.resolver_match.namespace == 'meta' %}active{% endif %}">Мета</a></li>
      <li><a href="#" class="nav-link">Драфт</a></li>
      <li><a href="#" class="nav-link">Билды</a></li>
      <li><a href="{% url 'guide:index' %}" class="nav-link {% if request.resolver_match.namespace == 'guide' %}active{% endif %}">Гайды</a></li>
      <li><a href="#" class="nav-link">Турниры</a></li>
    </ul>

    <div style="display:flex;align-items:center;gap:12px;">
      {% if user.is_authenticated %}
        <span style="font-size:13px;color:var(--text-2);">{{ user.email }}</span>
        <a href="{% url 'account_logout' %}" class="btn-outline" style="padding:8px 16px;font-size:13px;">Выйти</a>
      {% else %}
        <a href="{% url 'account_login' %}" class="nav-link hidden md:inline">Войти</a>
        <a href="{% url 'account_signup' %}" class="btn-outline" style="padding:8px 16px;font-size:13px;">Регистрация</a>
      {% endif %}

      <!-- Burger -->
      <button @click="open = !open" :aria-expanded="open.toString()" aria-label="Меню"
        style="display:flex;flex-direction:column;justify-content:center;gap:5px;background:none;border:none;cursor:pointer;padding:10px;min-width:44px;min-height:44px;"
        class="md:hidden">
        <span style="display:block;width:22px;height:2px;background:var(--text-1);border-radius:2px;transition:transform 250ms,opacity 250ms;"
          :style="open ? 'transform:translateY(7px) rotate(45deg)' : ''"></span>
        <span style="display:block;width:22px;height:2px;background:var(--text-1);border-radius:2px;transition:opacity 250ms;"
          :style="open ? 'opacity:0' : ''"></span>
        <span style="display:block;width:22px;height:2px;background:var(--text-1);border-radius:2px;transition:transform 250ms;"
          :style="open ? 'transform:translateY(-7px) rotate(-45deg)' : ''"></span>
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  <div x-show="open" x-transition style="background:var(--bg-deep);border-top:1px solid var(--border);padding:20px 24px 24px;" class="md:hidden">
    <ul style="list-style:none;display:flex;flex-direction:column;gap:4px;margin-bottom:20px;">
      <li><a href="{% url 'meta:index' %}" @click="open=false" style="display:block;color:var(--text-2);text-decoration:none;font-size:15px;font-weight:500;padding:12px 0;border-bottom:1px solid var(--border);">Мета</a></li>
      <li><a href="#" @click="open=false" style="display:block;color:var(--text-2);text-decoration:none;font-size:15px;font-weight:500;padding:12px 0;border-bottom:1px solid var(--border);">Драфт</a></li>
      <li><a href="#" @click="open=false" style="display:block;color:var(--text-2);text-decoration:none;font-size:15px;font-weight:500;padding:12px 0;border-bottom:1px solid var(--border);">Билды</a></li>
      <li><a href="{% url 'guide:index' %}" @click="open=false" style="display:block;color:var(--text-2);text-decoration:none;font-size:15px;font-weight:500;padding:12px 0;border-bottom:1px solid var(--border);">Гайды</a></li>
      <li><a href="#" @click="open=false" style="display:block;color:var(--text-2);text-decoration:none;font-size:15px;font-weight:500;padding:12px 0;">Турниры</a></li>
    </ul>
    {% if not user.is_authenticated %}
      <a href="{% url 'account_signup' %}" class="btn-primary" style="width:100%;justify-content:center;">Зарегистрироваться</a>
    {% endif %}
  </div>

</nav>
</header>
<div style="height:64px;" aria-hidden="true"></div>
