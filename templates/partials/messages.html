{% if messages %}
<div style="position:fixed;top:72px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px;max-width:360px;" aria-live="polite">
  {% for message in messages %}
  <div x-data="{ show: true }" x-show="show" x-transition
    style="padding:14px 20px;border-radius:10px;font-size:14px;border:1px solid;
    {% if message.tags == 'success' %}background:rgba(34,197,94,0.12);border-color:rgba(34,197,94,0.3);color:#4ade80;
    {% elif message.tags == 'error' %}background:rgba(239,68,68,0.12);border-color:rgba(239,68,68,0.3);color:#f87171;
    {% else %}background:var(--surface);border-color:var(--border);color:var(--text-1);{% endif %}"
    x-init="setTimeout(() => show = false, 4000)">
    {{ message }}
  </div>
  {% endfor %}
</div>
{% endif %}
