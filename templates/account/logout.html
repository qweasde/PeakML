{% extends "base.html" %}

{% block title %}Выход{% endblock %}

{% block content %}
<div style="min-height:calc(100dvh - 64px);display:flex;align-items:center;justify-content:center;padding:40px 16px;position:relative;overflow:hidden;">

  <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(127,119,221,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(127,119,221,.04) 1px,transparent 1px);background-size:48px 48px;" aria-hidden="true"></div>
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 50%,rgba(127,119,221,.07) 0%,transparent 65%);" aria-hidden="true"></div>

  <div class="auth-card" style="position:relative;z-index:2;width:100%;max-width:420px;padding:44px 40px;text-align:center;">

    <a href="/" style="font-family:'Russo One',sans-serif;font-size:28px;color:var(--accent);text-decoration:none;letter-spacing:.04em;text-shadow:0 0 32px rgba(127,119,221,.55);">
      Peak<span style="color:var(--text-1)">ML</span>
    </a>

    <div style="margin:28px auto;width:56px;height:56px;border-radius:50%;background:var(--accent-dim);border:1px solid var(--border-hover);display:flex;align-items:center;justify-content:center;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </div>

    <h2 style="font-family:'Russo One',sans-serif;font-size:22px;margin-bottom:10px;">Выйти из аккаунта?</h2>
    <p style="font-size:13px;color:var(--text-3);margin-bottom:32px;">Ты вернёшься на главную страницу.</p>

    <form method="POST" action="{% url 'account_logout' %}">
      {% csrf_token %}
      <button type="submit" class="btn-primary" style="width:100%;justify-content:center;height:50px;font-size:14px;">
        Да, выйти
      </button>
    </form>

    <a href="/" style="display:block;margin-top:16px;font-size:13px;color:var(--text-3);text-decoration:none;" onmouseover="this.style.color='var(--text-1)'" onmouseout="this.style.color='var(--text-3)'">
      Отмена
    </a>

  </div>
</div>
{% endblock %}
