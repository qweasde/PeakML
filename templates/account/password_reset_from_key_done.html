{% extends "base.html" %}

{% block title %}Пароль изменён{% endblock %}

{% block content %}
<div style="min-height:calc(100dvh - 64px);display:flex;align-items:center;justify-content:center;padding:40px 16px;position:relative;overflow:hidden;">

  <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(127,119,221,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(127,119,221,.04) 1px,transparent 1px);background-size:48px 48px;" aria-hidden="true"></div>
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 50%,rgba(127,119,221,.07) 0%,transparent 65%);" aria-hidden="true"></div>

  <div class="auth-card" style="position:relative;z-index:2;width:100%;max-width:420px;padding:52px 40px;text-align:center;">

    <a href="/" style="font-family:'Russo One',sans-serif;font-size:28px;color:var(--accent);text-decoration:none;letter-spacing:.04em;text-shadow:0 0 32px rgba(127,119,221,.55);">
      Peak<span style="color:var(--text-1)">ML</span>
    </a>

    <div style="margin:28px auto;width:64px;height:64px;border-radius:50%;background:rgba(52,211,153,0.10);border:1px solid rgba(52,211,153,0.30);display:flex;align-items:center;justify-content:center;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>

    <h2 style="font-family:'Russo One',sans-serif;font-size:22px;margin-bottom:12px;">Пароль изменён!</h2>
    <p style="font-size:14px;color:var(--text-2);line-height:1.7;margin-bottom:36px;">
      Теперь можешь войти с новым паролем.
    </p>

    <a href="{% url 'account_login' %}" class="btn-primary" style="display:inline-flex;width:100%;justify-content:center;height:50px;font-size:14px;">
      Войти
    </a>

  </div>
</div>
{% endblock %}
