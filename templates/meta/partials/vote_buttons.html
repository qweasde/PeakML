{% load static %}
<div style="display:flex;align-items:center;gap:8px;">
  {% if user.is_authenticated %}
  <button
    hx-post="{% url 'meta:vote' entry.pk %}"
    hx-vals='{"direction": "up"}'
    hx-target="#vote-{{ entry.pk }}"
    hx-swap="innerHTML"
    style="display:flex;align-items:center;gap:4px;background:{% if user_vote == True %}rgba(127,119,221,0.2){% else %}var(--surface-2){% endif %};border:1px solid {% if user_vote == True %}var(--accent){% else %}var(--border){% endif %};border-radius:6px;padding:5px 10px;color:{% if user_vote == True %}var(--accent){% else %}var(--text-3){% endif %};font-size:12px;cursor:pointer;transition:all 150ms;"
    aria-label="Голос за">
    ▲ {{ entry.votes_up }}
  </button>
  <button
    hx-post="{% url 'meta:vote' entry.pk %}"
    hx-vals='{"direction": "down"}'
    hx-target="#vote-{{ entry.pk }}"
    hx-swap="innerHTML"
    style="display:flex;align-items:center;gap:4px;background:{% if user_vote == False %}rgba(239,68,68,0.1){% else %}var(--surface-2){% endif %};border:1px solid {% if user_vote == False %}rgba(239,68,68,0.4){% else %}var(--border){% endif %};border-radius:6px;padding:5px 10px;color:{% if user_vote == False %}#f87171{% else %}var(--text-3){% endif %};font-size:12px;cursor:pointer;transition:all 150ms;"
    aria-label="Голос против">
    ▼ {{ entry.votes_down }}
  </button>
  {% else %}
  <a href="{% url 'account_login' %}?next={{ request.path }}" style="font-size:12px;color:var(--text-3);text-decoration:none;">
    ▲ {{ entry.votes_up }} &nbsp; ▼ {{ entry.votes_down }}
  </a>
  {% endif %}
</div>
